font: JetBrainsMono Nerd Font 11.5

background: "#1a1b26"
color: "#a9b1d6"
border: "#7aa2f7"
separator: " ➜ "

border_width: 2
corner_r: 8
padding: 24
rows_per_column: 10
column_padding: 24

anchor: center

inhibit_compositor_keyboard_shortcuts: true

auto_kbd_layout: true

menu:
  - key: "s"
    desc: "   System"
    submenu:
      - key: "s"
        desc: 󰒲  Suspend
        cmd: systemctl suspend
      - key: "r"
        desc:   Reboot
        cmd: systemctl reboot
      - key: "p"
        desc: ⏻  Poweroff
        cmd: systemctl poweroff

  - key: "p"
    desc: "   Power Profiles"
    submenu:
      - key: "d"
        desc:   Display
        cmd: |
          notify-send "Power Profile" "$(powerprofilesctl get)"
      - key: "b"
        desc:   Balanced
        cmd: |
          powerprofilesctl set balanced
          notify-send "Power Profile" "Set to Balanced"
      - key: "s"
        desc:   Saver
        cmd: |
          powerprofilesctl set power-saver
          notify-send "Power Profile" "Set to Power saver"
      - key: "p"
        desc:   Performance
        cmd: |
          powerprofilesctl set performance
          notify-send "Power Profile" "Set to Performance"

  - key: "c"
    desc: "   Tools"
    submenu:
      - key: "b"
        desc: 󰁿  Battery Status
        cmd: |
          battery-status
      - key: "c"
        desc:   Color Picker
        cmd: |
          hyprpicker -a

  - key: "m"
    desc: " 󰍹  Monitor Settings"
    submenu:
      - key: "1"
        desc: 󰍹  Set Resolution to 1920x1200
        cmd: |
          niri msg output eDP-1 custom-mode 1920x1200@60
          niri msg output eDP-1 scale 1
          notify-send "Monitor" "Resolution set 1920x1200\nScaling set to 1.0"
      - key: "2"
        desc: 󰍹  Set Resolution to 3840x2400
        cmd: |
          niri msg output eDP-1 mode 3840x2400@60
          niri msg output eDP-1 scale 2
          notify-send "Monitor" "Resolution set 3840x2400\nScaling set to 2.0"

  - key: "t"
    desc: " 󱄄  Theme Settings"
    submenu:
      - key: "t"
        desc: 󱄄  Default
        cmd: |
          dconf write /org/gnome/desktop/interface/color-scheme "'default'"
          pkill -USR2 foot || true
          notify-send "Application Theme" "Set to Default"
      - key: "d"
        desc: 󱄄  Dark
        cmd: |
          dconf write /org/gnome/desktop/interface/color-scheme "'prefer-dark'"
          pkill -USR1 foot || true
          notify-send "Application Theme" "Set to Dark"
      - key: "l"
        desc: 󱄄  Light
        cmd: |
          dconf write /org/gnome/desktop/interface/color-scheme "'prefer-light'"
          pkill -USR2 foot || true
          notify-send "Application Theme" "Set to Light"

  - key: "a"
    desc: "   Idle Inhibitor"
    submenu:
      - key: "a"
        desc:   Start Idle Inhibitor
        cmd: |
          systemctl --user stop swayidle.service
          notify-send "Idle Inhibitor" "Active"
      - key: "b"
        desc:   Stop Idle Inhibitor
        cmd: |
          systemctl --user start swayidle.service
          notify-send "Idle Inhibitor" "Inactive"
